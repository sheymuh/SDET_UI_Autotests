services:
  browser-downloader:
    image: alpine:latest
    container_name: browser-downloader
    command: |
      sh -c '
        apk add --no-cache docker-cli docker-cli-compose
        while ! docker info > /dev/null 2>&1; do sleep 1; done
        docker pull selenoid/vnc_chrome:128.0
        docker pull selenoid/vnc_firefox:125.0
        docker pull browsers/edge:124.0
        echo "All browser images downloaded"
        tail -f /dev/null
      '
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - selenoid_network

  selenoid:
    image: aerokube/selenoid:latest-release
    container_name: selenoid
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid/config:/etc/selenoid:ro
      - ./selenoid/logs:/opt/selenoid/logs
    environment:
      - DOCKER_API_VERSION=1.40
    command: [
      "-conf", "/etc/selenoid/browsers.json",
      "-log-output-dir", "/opt/selenoid/logs",
      "-container-network", "selenoid_network",
      "-session-attempt-timeout", "1m"
    ]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - selenoid_network
    depends_on:
      - browser-downloader

  selenoid-ui:
    image: aerokube/selenoid-ui:latest
    container_name: selenoid-ui
    restart: unless-stopped
    ports:
      - "8082:8080"
    links:
      - selenoid
    command: -selenoid-uri 'http://selenoid:4444'
    networks:
      - selenoid_network
    depends_on:
      - selenoid

  test-runner:
    container_name: test-runner
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./selenoid/test-results:/app/target/surefire-reports
      - ./selenoid/test-results/allure:/app/target/allure-results
      - maven-cache:/root/.m2/repository
      - ./src:/app/src:ro
      - ./pom.xml:/app/pom.xml:ro
    environment:
      - suiteFile=testng-cross-browser-selenoid.xml
    depends_on:
      selenoid:
        condition: service_healthy
    networks:
      - selenoid_network

networks:
  selenoid_network:
    name: selenoid_network
    driver: bridge

volumes:
  maven-cache:
    driver: local