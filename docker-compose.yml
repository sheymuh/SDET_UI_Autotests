version: "3.8"

services:
  selenoid:
    image: aerokube/selenoid:latest
    container_name: selenoid
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./selenoid/config:/etc/selenoid:ro
      - ./selenoid/logs:/opt/selenoid/logs
      - ./src/test/resources/configurations/browsers.json:/etc/selenoid/browsers.json:ro
    command: [
      "-conf", "/etc/selenoid/browsers.json",
      "-log-output-dir", "/opt/selenoid/logs",
      "-container-network", "selenoid_network",
      "-session-attempt-timeout", "1m"
    ]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - selenoid_network

  selenoid-ui:
    image: aerokube/selenoid-ui:latest
    container_name: selenoid-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    command: [ "--selenoid-uri", "http://selenoid:4444" ]
    networks:
      - selenoid_network
    depends_on:
      - selenoid

  test-runner:
    container_name: test-runner
    build:
      context: .
    volumes:
      - ./test-results:/results
      - maven-cache:/root/.m2/repository
      - ./src:/app/src:ro
      - ./pom.xml:/app/pom.xml:ro
    depends_on:
      selenoid:
        condition: service_healthy

networks:
  selenoid_network:
    name: selenoid_network
    driver: bridge

volumes:
  maven-cache:
    driver: local